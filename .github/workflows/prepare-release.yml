name: Prepare Release

# Creates a version-bump PR. Merging the PR triggers the publish workflow.
#
# For backport releases, run this workflow from the appropriate release/* branch.

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        type: choice
        options: [beta, stable, backport]
      build_number:
        description: '[Beta] Prerelease number (e.g. 50). Auto-increments from current version if not provided.'
        required: false
        type: string
      next_cycle:
        description: '[Stable] Base version for the next beta cycle (e.g. 26.4.0 or 27.0.0 for a major bump). Auto-increments minor if not provided.'
        required: false
        type: string
      types_version:
        description: '@adobe/premierepro version to pin (e.g. 26.3.0-beta.29). Defaults to the release version for beta/stable, or the base stable (X.Y.0) for backports.'
        required: false
        type: string

# Deny all permissions by default; each job opts in only to what it needs.
permissions: {}

jobs:
  prepare:
    name: Prepare ${{ inputs.type }} release PR
    runs-on: ubuntu-latest
    if: |
      github.repository == 'adobe/eslint-plugin-premierepro' &&
      (inputs.type != 'backport' || startsWith(github.ref, 'refs/heads/release/'))
    permissions:
      contents: write
      pull-requests: write
      actions: write    # required for gh workflow run (workflow_dispatch API)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history required for stable CHANGELOG generation (commit range
          # from the last stable tag to HEAD).
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Compute next version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.type }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: node .github/scripts/compute-version.mjs

      - name: Update package.json and package-lock.json
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Compute and pin @adobe/premierepro version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ inputs.type }}
          TYPES_VERSION_OVERRIDE: ${{ inputs.types_version }}
        run: |
          if [ -n "$TYPES_VERSION_OVERRIDE" ]; then
            TYPES_VERSION="$TYPES_VERSION_OVERRIDE"
          elif [ "$RELEASE_TYPE" = "backport" ]; then
            # Strip patch: 26.3.1 -> 26.3.0. Plugin backports fix rule logic, not
            # API definitions, so there is typically no matching types backport.
            TYPES_VERSION="${VERSION%.*}.0"
          else
            # beta and stable: pin to the same version
            TYPES_VERSION="$VERSION"
          fi

          # Compute peerDependency range:
          #   beta   -> exact (e.g. 26.3.0-beta.29) — betas are point-in-time
          #   stable/backport -> ~X.Y.0 (allows patches within the same minor)
          if echo "$TYPES_VERSION" | grep -q -- "-beta\."; then
            PEER_RANGE="$TYPES_VERSION"
          else
            BASE_TYPES_VERSION="${TYPES_VERSION%.*}.0"
            PEER_RANGE="~${BASE_TYPES_VERSION}"
          fi

          echo "Pinning @adobe/premierepro: devDependency=${TYPES_VERSION}, peerDependency=${PEER_RANGE}"

          npm install "@adobe/premierepro@${TYPES_VERSION}" --save-dev --save-exact --package-lock-only
          npm pkg set "peerDependencies.@adobe/premierepro=${PEER_RANGE}"

      - name: Update CHANGELOG
        env:
          RELEASE_TYPE: ${{ inputs.type }}
          VERSION: ${{ steps.version.outputs.version }}
        run: node .github/scripts/update-changelog.mjs

      - name: Extract release notes for PR body
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OUTPUT_FILE: /tmp/release-notes.md
        run: node .github/scripts/extract-release-notes.mjs

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ inputs.type }}
          NEXT_CYCLE: ${{ inputs.next_cycle }}
        run: |
          BRANCH="release-prep/${VERSION}"
          BASE_BRANCH="${{ github.ref_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md

          if [ "$RELEASE_TYPE" = "stable" ]; then
            RESOLVED_NEXT_CYCLE="${NEXT_CYCLE}"
            if [ -z "$RESOLVED_NEXT_CYCLE" ]; then
              RESOLVED_NEXT_CYCLE=$(node -p \
                "const [maj,min]='${VERSION}'.split('.'); \`\${maj}.\${+min+1}.0\`")
            fi
            # Next-Cycle is embedded in both the branch commit (fallback for non-squash
            # merges) and the PR body (picked up by detect-release.mjs when the squash
            # commit message is built from the PR title + description).
            git commit -m "chore: release ${VERSION}" -m "Next-Cycle: ${RESOLVED_NEXT_CYCLE}"
            printf 'Automated **stable** release PR for `%s`.\n\nMerging this PR will:\n- Publish `%s` to npm as `@latest`\n- Create the `release/%s` branch for future backports\n- Open a follow-up PR to begin the `%s` beta cycle\n\nNext-Cycle: %s\n' \
              "$VERSION" "$VERSION" "${VERSION%.*}" "${RESOLVED_NEXT_CYCLE}" "${RESOLVED_NEXT_CYCLE}" > /tmp/pr-body.md
          else
            git commit -m "chore: release ${VERSION}"
            printf 'Automated **%s** release PR for `%s`.\n\nMerging this PR will publish `%s` to npm.\n' \
              "$RELEASE_TYPE" "$VERSION" "$VERSION" > /tmp/pr-body.md
          fi

          # Append the CHANGELOG entry so reviewers (and the squash merge commit
          # message, when the repo uses "PR title and description" mode) include
          # the full list of changes going into this release.
          printf '\n---\n\n' >> /tmp/pr-body.md
          cat /tmp/release-notes.md >> /tmp/pr-body.md

          git push origin "$BRANCH"

          gh pr create \
            --title "chore: release ${VERSION}" \
            --body-file /tmp/pr-body.md \
            --base "$BASE_BRANCH" \
            --head "$BRANCH"

      # GitHub does not fire push-based workflow triggers when the push is made
      # by GITHUB_TOKEN (anti-recursion guard). Dispatching via the API bypasses
      # this restriction, so the CI check appears on the PR and branch protection
      # rules are satisfied.
      - name: Trigger CI on release-prep branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh workflow run ci.yaml --ref "release-prep/${VERSION}"
